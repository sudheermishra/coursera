  <!-- Floating card 1 -->
  <rect x="355" y="150" width="110" height="70" rx="10" fill="#1E2438" opacity="0.95"/>
  <rect x="355" y="150" width="110" height="70" rx="10" stroke="#E8A94D" stroke-width="1" stroke-opacity="0.3"/>
  <circle cx="374" cy="172" r="10" fill="#E8A94D" opacity="0.15"/>
  <text x="374" y="176" text-anchor="middle" font-size="11" fill="#E8A94D">✓</text>
  <rect x="390" y="166" width="60" height="6" rx="3" fill="#E8A94D" opacity="0.6"/>
  <rect x="368" y="186" width="84" height="5" rx="2.5" fill="#8896B3" opacity="0.5"/>
  <rect x="368" y="197" width="65" height="5" rx="2.5" fill="#8896B3" opacity="0.4"/>

  <!-- Floating card 2 -->
  <rect x="50" y="170" width="95" height="60" rx="10" fill="#1E2438" opacity="0.95"/>
  <rect x="50" y="170" width="95" height="60" rx="10" stroke="#A78BFA" stroke-width="1" stroke-opacity="0.3"/>
  <circle cx="68" cy="190" r="9" fill="#A78BFA" opacity="0.15"/>
  <text x="68" y="194" text-anchor="middle" font-size="10" fill="#A78BFA">⚛</text>
  <rect x="82" y="185" width="48" height="6" rx="3" fill="#A78BFA" opacity="0.6"/>
  <rect x="62" y="204" width="68" height="5" rx="2.5" fill="#8896B3" opacity="0.5"/>
  <rect x="62" y="215" width="52" height="5" rx="2.5" fill="#8896B3" opacity="0.4"/>

  <!-- Floating dots decoration -->
  <circle cx="430" cy="240" r="3" fill="#E8A94D" opacity="0.4"/>
  <circle cx="445" cy="255" r="2" fill="#E8A94D" opacity="0.25"/>
  <circle cx="420" cy="260" r="2" fill="#E8A94D" opacity="0.2"/>

  <circle cx="90" cy="260" r="3" fill="#A78BFA" opacity="0.4"/>
  <circle cx="75" cy="275" r="2" fill="#A78BFA" opacity="0.25"/>
  <circle cx="105" cy="278" r="2" fill="#A78BFA" opacity="0.2"/>
