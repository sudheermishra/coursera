  <rect x="175" y="235" width="140" height="6" rx="3" fill="#A78BFA" opacity="0.7"/>
  <rect x="175" y="248" width="110" height="6" rx="3" fill="#A78BFA" opacity="0.7"/>
  <rect x="162" y="261" width="70" height="6" rx="3" fill="#E8A94D" opacity="0.9"/>

  <!-- Cursor blink -->
