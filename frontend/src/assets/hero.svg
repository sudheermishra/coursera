  <!-- Laptop base -->
  <rect x="130" y="290" width="260" height="22" rx="5" fill="#1E2235"/>
  <rect x="110" y="306" width="300" height="8" rx="4" fill="#252A3F"/>

  <!-- Laptop screen -->
  <rect x="140" y="130" width="240" height="162" rx="10" fill="#1A1E30"/>
  <rect x="148" y="138" width="224" height="146" rx="7" fill="#0F1221"/>

  <!-- Screen content - code lines -->
  <rect x="162" y="155" width="80" height="7" rx="3" fill="#E8A94D" opacity="0.9"/>
  <rect x="162" y="170" width="130" height="6" rx="3" fill="#4A90D9" opacity="0.7"/>
  <rect x="175" y="183" width="100" height="6" rx="3" fill="#6BCB77" opacity="0.7"/>
