<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 400" fill="none">
  <!-- Glow background -->
  <ellipse cx="260" cy="340" rx="200" ry="24" fill="#E8A94D" opacity="0.12"/>

  <!-- Desk -->
